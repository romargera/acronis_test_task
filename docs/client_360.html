<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acronis Client 360 Prototype</title>
    <link rel="stylesheet" href="./assets/acv-reset.css" />
    <link rel="stylesheet" href="./assets/acv-theme-acronis.css" />
    <link rel="stylesheet" href="./assets/common.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <aside class="acronis-sidebar" aria-label="Product navigation">
        <div class="sidebar-brand">
          <div class="sidebar-brand-top">Acronis</div>
          <div class="sidebar-brand-bottom">Cyber Protect</div>
        </div>
        <div class="sidebar-block">
          <div class="sidebar-group">DASHBOARD</div>
          <div class="sidebar-item">Overview</div>
          <div class="sidebar-item">Alerts</div>
          <div class="sidebar-item">Activities</div>
          <div class="sidebar-item">Threat feed</div>
        </div>
        <div class="sidebar-block">
          <div class="sidebar-item active">Client 360</div>
          <div class="sidebar-item">Coverage</div>
          <div class="sidebar-item">Risk timeline</div>
          <div class="sidebar-item">QBR</div>
        </div>
      </aside>

      <div class="dashboard-content">
        <header class="dashboard-header">
          <h1 class="page-title">Client 360</h1>
          <div class="header-actions" aria-label="Header actions">
            <button class="icon-action" type="button" aria-label="Apps">◻</button>
            <button class="icon-action" type="button" aria-label="Help">?</button>
            <button class="icon-action" type="button" aria-label="Account">◉</button>
          </div>
        </header>

        <section class="content-toolbar">
          <div class="toolbar-icon">⤴</div>
          <div class="toolbar-links">
            <button class="toolbar-link" type="button">Generate QBR</button>
            <button class="toolbar-link" type="button">Download</button>
            <button class="toolbar-link" type="button">Send</button>
          </div>
        </section>

        <section class="filters" aria-label="Client selector">
          <select id="tenantPicker" class="select" aria-label="Tenant picker"></select>
          <button class="btn btn-secondary" id="backToSource" type="button">Back to source</button>
        </section>

        <section class="client-hero" id="hero"></section>

        <section class="grid grid-2">
          <article class="card">
            <div class="section-actions">
              <h2 class="card-title">Signals Timeline</h2>
              <div class="pill-tabs" id="timelineTabs">
                <button class="pill-tab active" type="button" data-type="all">All</button>
                <button class="pill-tab" type="button" data-type="risk">Risk</button>
                <button class="pill-tab" type="button" data-type="ops">Ops</button>
                <button class="pill-tab" type="button" data-type="biz">Business</button>
              </div>
            </div>
            <div id="timeline" class="timeline"></div>
          </article>

          <article class="card">
            <h2 class="card-title">Service Coverage & Gaps</h2>
            <table class="table">
              <thead>
                <tr>
                  <th>Service</th>
                  <th>Status</th>
                  <th>Impact</th>
                </tr>
              </thead>
              <tbody id="servicesTable"></tbody>
            </table>
          </article>
        </section>

        <section class="split">
          <article class="card">
            <h2 class="card-title">Posture Breakdown</h2>
            <div id="postureBars" class="metric-bars"></div>
          </article>

          <article class="card">
            <h2 class="card-title">AI Actions Queue</h2>
            <div id="actionsList" class="actions-list"></div>
          </article>
        </section>
      </div>
    </main>

    <div id="qbrModal" class="modal-backdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-label="QBR content">
        <div class="section-actions">
          <h2 class="card-title">QBR Draft</h2>
          <button class="btn btn-secondary" id="closeQbrModal" type="button">Close</button>
        </div>
        <div id="qbrBody" class="qbr-output"></div>
      </div>
    </div>

    <div class="toast" id="toast" aria-live="assertive"></div>

    <script src="./assets/data.js"></script>
    <script src="./assets/helpers.js"></script>
    <script>
      (function () {
        const data = window.AcronisDemoData;
        const utils = window.DemoUtils;

        const state = {
          tenantId: utils.queryParam("tenant") || data.tenants[0].id,
          source: utils.queryParam("source") || "ops",
          timelineFilter: "all"
        };

        const el = {
          tenantPicker: document.getElementById("tenantPicker"),
          hero: document.getElementById("hero"),
          timeline: document.getElementById("timeline"),
          servicesTable: document.getElementById("servicesTable"),
          postureBars: document.getElementById("postureBars"),
          actionsList: document.getElementById("actionsList"),
          backToSource: document.getElementById("backToSource"),
          timelineTabs: document.getElementById("timelineTabs"),
          qbrModal: document.getElementById("qbrModal"),
          qbrBody: document.getElementById("qbrBody")
        };

        function tenant() {
          return utils.getTenantById(state.tenantId) || data.tenants[0];
        }

        function renderTenantPicker() {
          el.tenantPicker.innerHTML = data.tenants
            .map(function (item) {
              const selected = item.id === state.tenantId ? " selected" : "";
              return `<option value="${item.id}"${selected}>${item.name}</option>`;
            })
            .join("");
        }

        function renderHero() {
          const item = tenant();
          const atRiskMRR = item.riskLevel === "critical" || item.riskLevel === "high" ? item.mrr : 0;

          el.hero.innerHTML = `
            <div class="section-actions">
              <h1 class="card-title">${item.name}</h1>
              <span class="${utils.riskClass(item.riskLevel)}">${item.riskLevel.toUpperCase()} risk</span>
            </div>
            <div class="card-subtitle">${item.segment} • ${item.region} • Tenure ${item.tenureMonths} months • Source: ${state.source.toUpperCase()}</div>
            <div class="kpi-grid">
              <div class="kpi-card"><div class="kpi-label">MRR</div><div class="kpi-value">${utils.formatCurrency(item.mrr)}</div></div>
              <div class="kpi-card"><div class="kpi-label">At-risk MRR</div><div class="kpi-value">${utils.formatCurrency(atRiskMRR)}</div></div>
              <div class="kpi-card"><div class="kpi-label">Posture Score</div><div class="kpi-value">${item.postureScore}/100</div></div>
              <div class="kpi-card"><div class="kpi-label">SLA Compliance</div><div class="kpi-value">${item.slaCompliance}%</div></div>
            </div>
          `;
        }

        function renderTimeline() {
          const item = tenant();
          const rows = (item.timeline || []).filter(function (event) {
            return state.timelineFilter === "all" || state.timelineFilter === event.type;
          });

          if (!rows.length) {
            el.timeline.innerHTML = '<div class="empty-state">No events for this filter.</div>';
            return;
          }

          el.timeline.innerHTML = rows
            .map(function (event) {
              return `
                <div class="timeline-item">
                  <div class="tiny">${event.date} • ${event.type.toUpperCase()}</div>
                  <div>${event.text}</div>
                </div>`;
            })
            .join("");
        }

        function renderServices() {
          const item = tenant();
          const descriptors = {
            backup: "Recovery resilience",
            edr: "Threat containment",
            m365: "SaaS continuity",
            patch: "Vulnerability reduction",
            dlp: "Data leakage prevention"
          };

          el.servicesTable.innerHTML = Object.keys(descriptors)
            .map(function (service) {
              const enabled = !!item.services[service];
              const status = enabled ? '<span class="badge badge-low">Active</span>' : '<span class="badge badge-medium">Gap</span>';
              const impact = enabled ? "Covered" : `Upsell potential ${utils.formatCurrency(180 + Math.round(item.mrr * 0.03))}`;
              return `<tr><td>${service.toUpperCase()}</td><td>${status}</td><td>${impact}</td></tr>`;
            })
            .join("");
        }

        function renderPosture() {
          const item = tenant();
          const bars = [
            { label: "Backup", value: item.backupSuccess },
            { label: "Patch", value: item.patchCompliance },
            { label: "SLA", value: item.slaCompliance },
            { label: "Margin", value: item.marginPct },
            { label: "Reopen Rate (inverse)", value: Math.max(2, 100 - item.reopenRate) }
          ];

          el.postureBars.innerHTML = bars
            .map(function (row) {
              return `
                <div class="metric-row">
                  <div class="section-actions"><span>${row.label}</span><span class="tiny">${row.value}%</span></div>
                  ${utils.createBar(row.value, 100)}
                </div>`;
            })
            .join("");
        }

        function renderActions() {
          const item = tenant();
          const primaryOpportunity = item.opportunities[0];

          const actions = [
            {
              title: "Retention Call",
              text: "Schedule sponsor-level check-in this week to address risk signals.",
              cta: "Mark Scheduled",
              handler: function () {
                utils.toast("Retention call scheduled");
              }
            },
            {
              title: "Policy Hardening",
              text: "Run patch hardening and backup verification for top-risk workloads.",
              cta: "Create Ops Task",
              handler: function () {
                utils.toast("Ops hardening task created");
              }
            },
            {
              title: "QBR Draft",
              text: "Generate executive-ready QBR with 90-day plan and next upsell angle.",
              cta: "Generate",
              handler: openQbr
            }
          ];

          if (primaryOpportunity) {
            actions.unshift({
              title: "Upsell Trigger",
              text: `Offer ${primaryOpportunity.name} package (+${utils.formatCurrency(primaryOpportunity.impact)} MRR potential).`,
              cta: "Create Proposal",
              handler: function () {
                utils.toast("Proposal draft created");
              }
            });
          }

          el.actionsList.innerHTML = actions
            .map(function (action, index) {
              return `
                <div class="action-item">
                  <strong>${action.title}</strong>
                  <div>${action.text}</div>
                  <button class="btn btn-primary" type="button" data-action-index="${index}">${action.cta}</button>
                </div>`;
            })
            .join("");

          el.actionsList.querySelectorAll("[data-action-index]").forEach(function (button) {
            button.addEventListener("click", function () {
              const index = Number(this.getAttribute("data-action-index"));
              actions[index].handler();
            });
          });
        }

        function openQbr() {
          const item = tenant();
          const nextAction = (item.opportunities[0] && item.opportunities[0].name) || "coverage optimization";

          el.qbrBody.innerHTML = `
            <h3>${item.name} — Quarterly Business Review</h3>
            <p><strong>What improved:</strong> backup success is ${item.backupSuccess}%, endpoint coverage at ${item.endpoints} devices.</p>
            <p><strong>What needs attention:</strong> posture ${item.postureScore}/100, SLA ${item.slaCompliance}%, reopen rate ${item.reopenRate}%.</p>
            <p><strong>Next 90 days:</strong> harden patch compliance, executive check-in cadence, and pitch ${nextAction} to improve resilience and ARPU.</p>
            <p><strong>Commercial outlook:</strong> projected uplift ${(item.opportunities[0] && utils.formatCurrency(item.opportunities[0].impact)) || "N/A"} monthly.</p>
            <div class="tiny">Prototype note: export to PDF/CRM sync is stubbed.</div>
          `;

          el.qbrModal.classList.add("open");
        }

        function render() {
          renderTenantPicker();
          renderHero();
          renderTimeline();
          renderServices();
          renderPosture();
          renderActions();
        }

        el.tenantPicker.addEventListener("change", function (event) {
          state.tenantId = event.target.value;
          const params = new URLSearchParams(window.location.search);
          params.set("tenant", state.tenantId);
          params.set("source", state.source);
          history.replaceState(null, "", `?${params.toString()}`);
          render();
        });

        el.backToSource.addEventListener("click", function () {
          if (state.source === "biz") {
            window.location.href = `./business_dashboard.html?focus=${state.tenantId}`;
            return;
          }
          window.location.href = `./operations_dashboard.html?focus=${state.tenantId}`;
        });

        el.timelineTabs.querySelectorAll(".pill-tab").forEach(function (button) {
          button.addEventListener("click", function () {
            state.timelineFilter = this.getAttribute("data-type");
            el.timelineTabs.querySelectorAll(".pill-tab").forEach(function (tab) {
              tab.classList.remove("active");
            });
            this.classList.add("active");
            renderTimeline();
          });
        });

        document.getElementById("closeQbrModal").addEventListener("click", function () {
          el.qbrModal.classList.remove("open");
        });
        el.qbrModal.addEventListener("click", function (event) {
          if (event.target === el.qbrModal) {
            el.qbrModal.classList.remove("open");
          }
        });

        render();
      })();
    </script>
  </body>
</html>
